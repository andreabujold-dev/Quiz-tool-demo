<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moneris — Find Your Solution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1B3A52;
  --navy-light: #2C5282;
  --red: #E74C3C;
  --cyan: #4A9FBE;
  --gray-light: #F5F5F5;
  --gray-med: #E8E8E8;
  --gray-dark: #666666;
  --text-dark: #1B3A52;
  --text-gray: #666666;
  --white: #FFFFFF;
  --border: #D0D0D0;
  --transition: all 0.2s ease;
}

html { font-size: 16px; }
body { 
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
  background: var(--white); 
  color: var(--text-dark); 
  min-height: 100vh; 
}

/* Topbar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 2rem;
  background: var(--white);
  border-bottom: 1px solid var(--gray-med);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-weight: 700;
  font-size: 18px;
  color: var(--text-dark);
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-icon { width: 6px; height: 6px; background: var(--red); border-radius: 50%; }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  font-size: 13px;
}

.topbar-right a {
  color: var(--text-dark);
  text-decoration: none;
  font-weight: 500;
  cursor: pointer;
}

.btn-signin { 
  color: var(--text-dark); 
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 4px;
  background: var(--white);
}

.btn-signup {
  background: var(--red);
  color: var(--white);
  border: none;
  padding: 8px 20px;
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.btn-signup:hover { background: #d63d2d; }

/* Main container */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* Hero section */
.hero {
  background: linear-gradient(135deg, var(--navy) 0%, #0f2a3a 100%);
  color: var(--white);
  padding: 3rem;
  border-radius: 8px;
  margin-bottom: 2rem;
  text-align: center;
}

.hero h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 0.5rem;
  line-height: 1.3;
}

.hero h1 .red { color: var(--red); }

.hero p {
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 1.5rem;
  line-height: 1.6;
}

.hero .btn-cta {
  background: var(--red);
  color: var(--white);
  border: none;
  padding: 10px 24px;
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-size: 14px;
}

.hero .btn-cta:hover { background: #d63d2d; }

/* Stats section */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 2rem;
  margin-bottom: 2rem;
  padding: 2rem 0;
  border-bottom: 1px solid var(--gray-med);
}

.stat {
  text-align: center;
}

.stat-label {
  font-size: 12px;
  color: var(--text-gray);
  font-weight: 600;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-underline {
  width: 40px;
  height: 3px;
  margin: 0.75rem auto 0;
  border-radius: 2px;
}

.stat-underline.red { background: var(--red); }
.stat-underline.blue { background: var(--cyan); }
.stat-underline.navy { background: var(--navy); }

/* Question card */
.card {
  background: var(--white);
  border: 1px solid var(--gray-med);
  border-radius: 8px;
  padding: 2rem;
  margin-bottom: 2rem;
}

.card-header {
  margin-bottom: 2rem;
}

.card-label {
  font-size: 12px;
  color: var(--cyan);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0.75rem;
}

.card-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 0.5rem;
  line-height: 1.3;
}

.card-title .red { color: var(--red); }

.card-subtitle {
  font-size: 14px;
  color: var(--text-gray);
  line-height: 1.6;
}

/* Progress bar */
.progress-section {
  margin-bottom: 1.5rem;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.5rem;
  font-size: 12px;
  color: var(--text-gray);
}

.progress-bar {
  height: 3px;
  background: var(--gray-med);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan) 0%, var(--navy) 100%);
  transition: width 0.4s ease;
}

/* Options */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 2rem 0;
}

.option {
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  background: var(--white);
  border-radius: 4px;
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-dark);
  display: flex;
  align-items: center;
  gap: 12px;
}

.option::before {
  content: '';
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-radius: 50%;
  flex-shrink: 0;
  transition: var(--transition);
}

.option:hover {
  border-color: var(--navy);
  background: var(--gray-light);
}

.option:hover::before {
  border-color: var(--navy);
}

.option.selected {
  border-color: var(--navy);
  background: var(--gray-light);
}

.option.selected::before {
  background: var(--navy);
  border-color: var(--navy);
  box-shadow: inset 0 0 0 3px var(--white);
}

/* Navigation */
.nav-section {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--gray-med);
}

.btn-back {
  background: none;
  border: none;
  color: var(--text-gray);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: var(--transition);
}

.btn-back:hover { color: var(--text-dark); }

.btn-next {
  background: var(--navy);
  color: var(--white);
  border: none;
  padding: 10px 24px;
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  opacity: 0.4;
  pointer-events: none;
}

.btn-next.active {
  opacity: 1;
  pointer-events: all;
}

.btn-next:hover {
  background: var(--navy-light);
}

/* Product cards */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem;
  margin: 2rem 0;
}

.product-card {
  border: 1px solid var(--gray-med);
  border-radius: 8px;
  padding: 1.5rem;
  text-align: center;
  transition: var(--transition);
}

.product-card:hover {
  border-color: var(--cyan);
  box-shadow: 0 4px 12px rgba(74, 159, 190, 0.1);
}

.product-badge {
  display: inline-block;
  background: var(--cyan);
  color: var(--white);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 1rem;
  letter-spacing: 0.4px;
}

.product-image {
  width: 100%;
  height: 120px;
  background: var(--gray-light);
  border-radius: 4px;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}

.product-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 0.75rem;
}

.product-desc {
  font-size: 13px;
  color: var(--text-gray);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.product-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 1.5rem;
}

.product-ctas {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-primary {
  background: var(--navy);
  color: var(--white);
  border: none;
  padding: 10px 16px;
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-size: 13px;
}

.btn-primary:hover { background: var(--navy-light); }

.btn-secondary {
  background: var(--white);
  color: var(--text-dark);
  border: 1.5px solid var(--border);
  padding: 10px 16px;
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-size: 13px;
}

.btn-secondary:hover { border-color: var(--navy); }

/* Result message */
.result-message {
  background: var(--gray-light);
  padding: 2rem;
  border-radius: 8px;
  text-align: center;
  margin: 2rem 0;
}

.result-message h2 {
  font-size: 20px;
  color: var(--text-dark);
  margin-bottom: 0.5rem;
}

.result-message p {
  font-size: 14px;
  color: var(--text-gray);
  line-height: 1.6;
}

/* Footer */
.footer {
  background: var(--gray-light);
  padding: 2rem;
  text-align: center;
  font-size: 12px;
  color: var(--text-gray);
  border-top: 1px solid var(--gray-med);
}

.footer a {
  color: var(--text-dark);
  text-decoration: none;
  font-weight: 600;
}

.hidden { display: none; }

@media (max-width: 600px) {
  .topbar { padding: 1rem; }
  .container { padding: 1.5rem 1rem; }
  .hero { padding: 2rem 1.5rem; }
  .hero h1 { font-size: 24px; }
  .card { padding: 1.5rem; }
  .products { grid-template-columns: 1fr; }
  .stats { gap: 1.5rem; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span class="logo-icon"></span>Moneris</div>
  <div class="topbar-right">
    <a href="#">Solutions</a>
    <a href="#">Pricing</a>
    <a href="#">Company</a>
    <button class="btn-signin">Sign in</button>
    <button class="btn-signup">Get started</button>
  </div>
</div>

<div class="container">
  <div class="hero" id="hero" style="display: none;">
    <h1>Powering Canadian <span class="red">small businesses.</span></h1>
    <p>Payment solutions and commerce tools that grow with your business. Trusted by thousands across Canada.</p>
    <button class="btn-cta" onclick="startQuiz()">Explore solutions</button>
  </div>

  <div id="content"></div>
</div>

<div class="footer">
  &copy; 2026 Moneris Solutions Corporation &mdash; <a href="#">Privacy</a> &middot; <a href="#">Terms</a> &middot; <a href="#">Help Centre</a>
</div>

<script>
const P = {
  goTerminal:    { name: "Moneris Go Terminal", desc: "Next-gen portable terminal — PCI 7-ready, 12hr battery, 7\" display. Works countertop or curbside.", price: "$0.00" },
  goPlus:        { name: "Moneris Go Plus", desc: "Smart terminal with 6\" touchscreen, built-in printer, front & rear cameras, and all-day battery.", price: "$0.00" },
  goRetail:      { name: "Moneris Go Retail", desc: "Portable POS for micro and small businesses selling in-store and on the go. Add-on for $10/month.", price: "$10/mo" },
  totalCommerce: { name: "Moneris Total Commerce", desc: "Omnichannel POS built with Wix — unify in-store and online sales in one platform.", price: "Custom" },
  goRestaurant:  { name: "Moneris Go Restaurant", desc: "All-in-one POS for small and independent counter-service restaurants. From $30/month.", price: "$30/mo" },
  touchBistro:   { name: "Moneris + TouchBistro", desc: "Full-service restaurant management with Pay-at-Table, front- and back-of-house tools, and Moneris Go.", price: "Custom" },
  monerisOnline: { name: "Moneris Online", desc: "Ecommerce built with Wix. Accept payments, send invoices, and sell online with fraud protection built in.", price: "Custom" },
  paydInvoicing: { name: "PAYD Invoicing", desc: "Send invoices by email or SMS. Clients pay via a secure Moneris-hosted link — no terminal needed.", price: "$0/mo" },
  goPinPad:      { name: "Moneris Go PIN Pad", desc: "Countertop PIN pad for multi-lane or partner POS integrations. Android 11, fast processing.", price: "$0.00" },
};

const quizzes = [
  { 
    id: 0, 
    label: "Homepage", 
    title: "Let's find your fit.", 
    subtitle: "A few quick questions to point you in the right direction.",
    steps: [
      { q: "What brought you here today?", opts: ["Just exploring", "Looking for a solution"] },
      { q: "What type of business do you run?", opts: ["Retail", "Restaurant", "Health & beauty", "Professional services", "Trades", "Other"] },
      { q: "How do you sell?", opts: ["In-person only", "Online only", "Both in-person and online"] },
      { q: "What's your biggest priority right now?", opts: ["Accepting payments", "Managing my business", "Growing sales", "Reducing costs"] }
    ],
    endpoints: {
      default: { 
        type: "products", 
        title: "Here's what we'd recommend.",
        subtitle: "Based on your answers, these solutions are the best fit for your business.",
        prods: [P.goRetail, P.goTerminal, P.totalCommerce], 
        bestIdx: 0
      }
    }
  },
  { 
    id: 1, 
    label: "Restaurants", 
    title: "Find your restaurant solution.",
    subtitle: "Tell us about your restaurant and we'll match you to the right fit.",
    steps: [
      { q: "What type of restaurant do you run?", opts: ["Full-service / fine dining", "Quick service or fast casual", "Café or bakery", "Food truck or market", "Bar or nightclub"] },
      { q: "How do customers order from you?", opts: ["Table-side", "Counter", "Online", "All of the above"] },
      { q: "Do you need online ordering or delivery integration?", opts: ["Yes, it's essential", "Nice to have", "No, strictly in-person"] },
      { q: "How many locations do you operate?", opts: ["Just one", "2–5 locations", "6 or more", "Planning to expand"] }
    ],
    endpoints: {
      "Full-service / fine dining": { type: "products", title: "Here's what we'd recommend.", subtitle: "Built for full-service restaurants with table-side payments and back-of-house management.", prods: [P.touchBistro, P.goPlus, P.goTerminal], bestIdx: 0 },
      default: { type: "products", title: "Here's what we'd recommend.", subtitle: "Based on your answers, these solutions are the best fit for your restaurant.", prods: [P.goRestaurant, P.goTerminal, P.touchBistro], bestIdx: 0 }
    }
  },
  { 
    id: 2, 
    label: "Retail", 
    title: "Find your retail solution.",
    subtitle: "Tell us about your retail business and we'll match you to the right fit.",
    steps: [
      { q: "What type of retail do you run?", opts: ["Fashion or apparel", "Electronics", "Home & garden", "Food & beverage", "Other"] },
      { q: "Do you sell online?", opts: ["Yes, it's important", "A little", "No, in-store only"] },
      { q: "How many locations?", opts: ["Just one", "2-5 locations", "6+ locations"] }
    ],
    endpoints: {
      "Yes, it's important": { type: "products", title: "Here's what we'd recommend.", subtitle: "You need strong in-store and online coverage.", prods: [P.totalCommerce, P.goRetail, P.monerisOnline], bestIdx: 0 },
      default: { type: "products", title: "Here's what we'd recommend.", subtitle: "Based on your answers, these solutions are the best fit.", prods: [P.goRetail, P.goTerminal, P.totalCommerce], bestIdx: 0 }
    }
  }
];

let currentQuiz = 0;
let currentStep = 0;
let answers = {};

function startQuiz() {
  document.getElementById('hero').style.display = 'none';
  currentQuiz = 0;
  currentStep = 0;
  answers = {};
  renderQuiz();
}

function renderQuiz() {
  const quiz = quizzes[currentQuiz];
  const isComplete = currentStep >= quiz.steps.length;
  
  let html = `
    <div class="card">
      <div class="card-header">
        <div class="card-label">${quiz.label}</div>
        <h2 class="card-title">${quiz.title}</h2>
        <p class="card-subtitle">${quiz.subtitle}</p>
      </div>
  `;

  if (!isComplete) {
    const step = quiz.steps[currentStep];
    const progress = Math.round(((currentStep + 1) / quiz.steps.length) * 100);
    
    html += `
      <div class="progress-section">
        <div class="progress-meta">
          <span>Question</span>
          <span>${currentStep + 1} / ${quiz.steps.length}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${progress}%"></div>
        </div>
      </div>

      <div>
        <h3 style="font-size: 18px; margin-bottom: 1.5rem; color: var(--text-dark);">${step.q}</h3>
        <div class="options">
          ${step.opts.map((opt, idx) => `
            <button class="option ${answers[currentStep] === opt ? 'selected' : ''}" 
              onclick="selectOption(${currentStep}, '${opt.replace(/'/g, "\\'")}')">${opt}</button>
          `).join('')}
        </div>
      </div>

      <div class="nav-section">
        <button class="btn-back" onclick="goBack()" style="visibility: ${currentStep === 0 ? 'hidden' : 'visible'};">← Back</button>
        <button class="btn-next ${answers[currentStep] ? 'active' : ''}" onclick="nextStep()">
          ${currentStep === quiz.steps.length - 1 ? 'See recommendation' : 'Next'} →
        </button>
      </div>
    </div>
    `;
  } else {
    const endpoint = quiz.endpoints[answers[0]] || quiz.endpoints.default;
    
    html += `
      <div class="result-message">
        <h2>${endpoint.title}</h2>
        <p>${endpoint.subtitle}</p>
      </div>

      <div class="products">
        ${endpoint.prods.map((prod, idx) => `
          <div class="product-card">
            ${idx === endpoint.bestIdx ? '<div class="product-badge">Best fit</div>' : '<div style="height: 24px;"></div>'}
            <div class="product-image">💳</div>
            <div class="product-name">${prod.name}</div>
            <div class="product-desc">${prod.desc}</div>
            <div class="product-price">${prod.price}</div>
            <div class="product-ctas">
              <button class="btn-primary">Learn more</button>
              <button class="btn-secondary">Contact sales</button>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="nav-section" style="margin-top: 2rem;">
        <button class="btn-back" onclick="resetQuiz()">← Start over</button>
      </div>
    `;
  }

  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

function selectOption(step, option) {
  answers[step] = option;
  renderQuiz();
}

function nextStep() {
  if (answers[currentStep]) {
    currentStep++;
    renderQuiz();
  }
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderQuiz();
  }
}

function resetQuiz() {
  currentStep = 0;
  answers = {};
  renderQuiz();
}

// Initial render
document.getElementById('hero').style.display = 'block';
</script>

</body>
</html>
