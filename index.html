*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #1B3A52; --navy-light: #2C5282; --red: #E74C3C;
  --cyan: #4A9FBE; --gray-light: #F5F5F5; --gray-med: #E8E8E8;
  --text-dark: #1B3A52; --text-gray: #666666;
  --white: #FFFFFF; --border: #D0D0D0; --transition: all 0.2s ease;
}
html { font-size: 16px; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--white); color: var(--text-dark); min-height: 100vh; }

/* TOP BARS */
.topbar-info { display: flex; justify-content: flex-end; gap: 2rem; padding: 0.75rem 2rem; background: var(--white); border-bottom: 1px solid var(--gray-med); font-size: 12px; }
.topbar-info a { color: var(--text-dark); text-decoration: none; font-weight: 500; }
.topbar-info a:hover { color: var(--red); }
.topbar-info select { background: none; border: none; color: var(--text-dark); font-weight: 500; cursor: pointer; font-size: 12px; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--white); border-bottom: 1px solid var(--gray-med); position: sticky; top: 0; z-index: 100; }
.logo-svg { height: 36px; width: auto; display: block; }
.topbar-nav { display: flex; align-items: center; gap: 2.5rem; flex: 1; margin-left: 3rem; font-size: 13px; }
.topbar-nav a { color: var(--text-dark); text-decoration: none; font-weight: 500; cursor: pointer; }
.topbar-nav a::after { content: '▼'; font-size: 8px; margin-left: 4px; opacity: 0.6; }
.topbar-nav a:hover { color: var(--red); }
.topbar-right { display: flex; align-items: center; gap: 1rem; margin-left: auto; }
.btn-login { color: var(--text-dark); border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; background: var(--white); cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; }
.btn-login:hover { border-color: var(--navy); }
.btn-getstarted { background: var(--red); color: var(--white); border: none; padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 13px; font-family: inherit; }
.btn-getstarted:hover { background: #d63d2d; }

/* CONTAINER */
.container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

/* HERO */
.hero { background: linear-gradient(135deg, var(--navy) 0%, #0f2a3a 100%); color: var(--white); padding: 4rem 2rem; margin: 2rem 0; border-radius: 8px; text-align: center; }
.hero h1 { font-size: 36px; font-weight: 700; margin-bottom: 1rem; line-height: 1.2; }
.hero h1 .red { color: var(--red); }
.hero p { font-size: 15px; opacity: 0.9; max-width: 600px; margin: 0 auto 1.5rem; line-height: 1.6; }
.trustpilot { font-size: 13px; opacity: 0.7; margin-top: 1rem; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin: 2rem 0; padding: 2rem 0; border-bottom: 1px solid var(--gray-med); }
.stat { text-align: center; }
.stat-label { font-size: 12px; color: var(--text-gray); font-weight: 600; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 0.75rem; }
.stat-line { width: 50px; height: 3px; margin: 0 auto; border-radius: 2px; }
.stat-line.red { background: var(--red); }
.stat-line.blue { background: var(--cyan); }
.stat-line.navy { background: var(--navy); }

/* QUIZ CARD */
.card { background: var(--white); border: 1px solid var(--gray-med); border-radius: 8px; padding: 2.5rem; margin-bottom: 1.5rem; }
.card-label { font-size: 12px; color: var(--cyan); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.75rem; }
.card-title { font-size: 24px; font-weight: 700; color: var(--text-dark); margin-bottom: 0.75rem; line-height: 1.3; }
.card-subtitle { font-size: 14px; color: var(--text-gray); line-height: 1.6; margin-bottom: 1.5rem; }

/* PROGRESS */
.progress-wrap { margin-bottom: 2rem; }
.progress-meta { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-gray); font-weight: 500; margin-bottom: 0.75rem; }
.pbar { height: 4px; background: var(--gray-med); border-radius: 2px; overflow: hidden; }
.pfill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--navy)); border-radius: 2px; transition: width 0.4s ease; }

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 10px; margin: 1.5rem 0; }
.opt { padding: 14px 18px; border: 1.5px solid var(--border); background: var(--white); border-radius: 4px; cursor: pointer; text-align: left; font-size: 14px; font-weight: 500; color: var(--text-dark); display: flex; align-items: center; gap: 12px; transition: var(--transition); font-family: inherit; }
.opt::before { content: ''; width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; transition: var(--transition); }
.opt:hover { border-color: var(--navy); background: var(--gray-light); }
.opt:hover::before { border-color: var(--navy); }
.opt.sel { border-color: var(--navy); background: var(--gray-light); }
.opt.sel::before { background: var(--navy); border-color: var(--navy); box-shadow: inset 0 0 0 3px var(--white); }

/* NAV */
.nav { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1.75rem; border-top: 1px solid var(--gray-med); }
.btn-back { background: none; border: none; color: var(--text-gray); cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; }
.btn-back:hover { color: var(--text-dark); }
.btn-next { background: var(--navy); color: var(--white); border: none; padding: 11px 26px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 14px; font-family: inherit; opacity: 0.35; pointer-events: none; transition: var(--transition); }
.btn-next.rdy { opacity: 1; pointer-events: all; }
.btn-next.rdy:hover { background: var(--navy-light); }

/* ENDPOINT BADGE */
.ep-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 1rem; }
.ep-g { background: #E8F5F0; color: #0A5C42; }
.ep-b { background: #E6F1FB; color: #0C447C; }
.ep-a { background: #FEF3E2; color: #7B4A00; }

/* PRODUCT CARDS */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; margin: 1.5rem 0; }
.product-card { border: 1px solid var(--gray-med); border-radius: 8px; padding: 1.75rem; text-align: center; transition: var(--transition); background: var(--white); }
.product-card.best { border-color: var(--cyan); box-shadow: 0 4px 16px rgba(74,159,190,0.15); }
.product-badge { display: inline-block; background: var(--cyan); color: var(--white); padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 1rem; letter-spacing: 0.4px; }
.product-icon { font-size: 48px; margin-bottom: 1rem; }
.product-name { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 0.75rem; }
.product-desc { font-size: 13px; color: var(--text-gray); line-height: 1.6; margin-bottom: 1.5rem; min-height: 56px; }
.btn-primary { background: var(--navy); color: var(--white); border: none; padding: 10px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 13px; width: 100%; font-family: inherit; transition: var(--transition); text-decoration: none; display: block; text-align: center; }
.btn-primary:hover { background: var(--navy-light); }
.btn-outline { background: var(--white); color: var(--text-dark); border: 1.5px solid var(--border); padding: 10px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 13px; width: 100%; margin-top: 8px; font-family: inherit; transition: var(--transition); text-decoration: none; display: block; text-align: center; }
.btn-outline:hover { border-color: var(--navy); color: var(--navy); }

/* DIVIDER & FALLBACK */
.dvd { height: 1px; background: var(--gray-med); margin: 1.75rem 0; }
.fallback { font-size: 13px; color: var(--text-gray); text-align: center; padding-top: 1rem; }
.fallback a { color: var(--navy); font-weight: 600; cursor: pointer; text-decoration: none; }
.fallback a:hover { color: var(--red); }

/* FOOTER */
.footer { background: var(--gray-light); padding: 2rem; text-align: center; font-size: 12px; color: var(--text-gray); border-top: 1px solid var(--gray-med); margin-top: 3rem; }
.footer a { color: var(--text-dark); text-decoration: none; font-weight: 600; }

@media (max-width: 768px) {
  .topbar-nav { display: none; }
  .topbar { padding: 1rem; }
  .hero h1 { font-size: 26px; }
  .stats { grid-template-columns: 1fr; gap: 1rem; }
  .card { padding: 1.5rem; }
  .product-grid { grid-template-columns: 1fr; }
}
</style>

// ─── PRODUCT URLS (language-independent) ─────────────────────────────────────
const URLS = {
  goTerminal:     "https://www.moneris.com/en/solutions/terminals/moneris-go",
  goRetailPOS:    "https://www.moneris.com/en/solutions/pos-systems/go-retail",
  totalCommerce:  "https://www.moneris.com/en/solutions/pos-systems/total-commerce",
  tapToPay:       "https://www.moneris.com/en/solutions/mobile/tap-to-pay-on-iphone",
  monerisGateway: "https://www.moneris.com/en/solutions/ecommerce/moneris-gateway",
  monerisOnline:  "https://www.moneris.com/en/solutions/ecommerce/moneris-online",
  monerisAPI:     "https://www.moneris.com/en/solutions/ecommerce/moneris-api",
  goRestaurant:   "https://www.moneris.com/en/solutions/pos-systems/go-restaurant",
  monerisKiosk:   "https://www.moneris.com/en/restaurants/self-ordering-kiosk",
  monerisCheckout:"https://www.moneris.com/en/solutions/ecommerce/moneris-gateway",
  tipTap:         "https://www.tiptappay.com/",
};

const ICONS = {
  goTerminal:"💳", goRetailPOS:"🛍️", totalCommerce:"🌐", tapToPay:"📱",
  monerisGateway:"🔗", monerisOnline:"💻", monerisAPI:"⚙️",
  goRestaurant:"🍽️", monerisKiosk:"🖥️", monerisCheckout:"🛒", tipTap:"💝"
};

// ─── ENDPOINT PRODUCT LISTS ───────────────────────────────────────────────────
const EP_PRODS = {
  "retail|inperson":        { prods:["goTerminal","goRetailPOS","totalCommerce"],      best:0 },
  "retail|online":          { prods:["monerisGateway","monerisOnline","monerisAPI"],   best:0 },
  "retail|both":            { prods:["goTerminal","monerisGateway","totalCommerce"],   best:0 },
  "restaurant|inperson":    { prods:["tapToPay","goTerminal","goRestaurant"],          best:0 },
  "restaurant|online":      { prods:["monerisGateway","monerisOnline","monerisAPI"],   best:0 },
  "restaurant|both":        { prods:["goTerminal","goRestaurant","monerisKiosk"],      best:0 },
  "professional|inperson":  { prods:["tapToPay","goTerminal"],                         best:0 },
  "professional|online":    { prods:["monerisGateway","monerisOnline"],                best:0 },
  "professional|both":      { prods:["goTerminal","monerisGateway","monerisOnline"],   best:0 },
  "public|inperson":        { prods:["tapToPay","goTerminal"],                         best:0 },
  "public|online":          { prods:["monerisGateway","monerisOnline"],                best:0 },
  "public|both":            { prods:["goTerminal","monerisGateway","monerisOnline"],   best:0 },
  "health|inperson":        { prods:["tapToPay","goTerminal"],                         best:0 },
  "health|online":          { prods:["monerisGateway","monerisOnline"],                best:0 },
  "health|both":            { prods:["goTerminal","monerisGateway","monerisOnline"],   best:0 },
  "trades|inperson":        { prods:["tapToPay","goTerminal"],                         best:0 },
  "trades|online":          { prods:["monerisGateway","monerisOnline"],                best:0 },
  "trades|both":            { prods:["goTerminal","monerisGateway","monerisOnline"],   best:0 },
  "nonprofit|inperson":     { prods:["goTerminal","tipTap"],                           best:0 },
  "nonprofit|online":       { prods:["monerisCheckout","monerisGateway","monerisOnline"], best:0 },
  "nonprofit|both":         { prods:["goTerminal","monerisCheckout","monerisGateway"], best:0 },
};

// Industry answer → key (handles both EN and FR options)
function industryKey(ans) {
  const map = {
    // EN
    "Retail":"retail","Restaurant":"restaurant","Professional services":"professional",
    "Public sector":"public","Health and beauty":"health","Trades":"trades","Not-for-profit":"nonprofit",
    // FR
    "Commerce de détail":"retail","Services professionnels":"professional",
    "Secteur public":"public","Santé et beauté":"health","Métiers spécialisés":"trades",
    "Organisme sans but lucratif":"nonprofit"
  };
  return map[ans] || "retail";
}

function paymentKey(ans) {
  // EN
  if (ans === "In-store (POS / Terminal)") return "inperson";
  if (ans === "Online / E-commerce") return "online";
  // FR
  if (ans === "En magasin (TPV / terminal)") return "inperson";
  if (ans === "En ligne / commerce électronique") return "online";
  return "both";
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let lang = "en";
let st = { step: 0, ans: {} };

// ─── LANGUAGE SWITCH ──────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  applyStaticTranslations();
  // Reset quiz so option keys match current language
  st = { step: 0, ans: {} };
  render();
}

function t(key) { return T[lang][key] || T.en[key] || key; }

function applyStaticTranslations() {
  // All data-t elements outside the shell
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    const val = T[lang][key];
    if (val !== undefined) el.innerHTML = val;
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const shell = document.getElementById('shell');

  if (st.step >= 3) {
    shell.innerHTML = buildEndpoint();
    return;
  }

  const cur = st.step;
  const s = T[lang].steps[cur];
  const pct = Math.round((cur / 3) * 100);
  const isLast = cur === 2;

  shell.innerHTML = `
    <div class="card">
      <div class="card-label">${t('quizLabel')}</div>
      <div class="card-title">${t('quizTitle')}</div>
      <div class="card-subtitle">${t('quizSub')}</div>
      <div class="progress-wrap">
        <div class="progress-meta"><span>${t('questionWord')}</span><span>${cur + 1} / 3</span></div>
        <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      </div>
      <div style="font-size:18px;font-weight:700;color:var(--text-dark);margin-bottom:0.5rem;line-height:1.4;">${s.q}</div>
      <div class="options">
        ${s.opts.map(o => `<button class="opt${st.ans[cur] === o ? ' sel' : ''}" onclick="pick('${esc(o)}', ${cur})">${o}</button>`).join('')}
      </div>
      <div class="nav">
        ${cur > 0
          ? `<button class="btn-back" onclick="goBack()">${t('backBtn')}</button>`
          : `<span></span>`
        }
        <button class="btn-next${st.ans[cur] ? ' rdy' : ''}" onclick="goNext()">
          ${isLast ? t('seeRec') : t('nextBtn')}
        </button>
      </div>
    </div>
    <div class="fallback">${t('needHelp')} <a href="#">${t('talkPerson')}</a></div>`;
}

// ─── ENDPOINT BUILDER ─────────────────────────────────────────────────────────
function buildEndpoint() {
  const ind = industryKey(st.ans[1]);
  const pay = paymentKey(st.ans[2]);
  const key = `${ind}|${pay}`;
  const epProds = EP_PRODS[key] || EP_PRODS["retail|both"];
  const epText = T[lang].endpoints;
  const desc = epText.descs[key] || epText.descs["retail|both"];
  const prods = T[lang].products;

  const cards = epProds.prods.map((k, i) => {
    const p = prods[k];
    return `<div class="product-card${i === epProds.best ? ' best' : ''}">
      ${i === epProds.best
        ? `<div class="product-badge">${t('bestOption')}</div>`
        : `<div style="height:28px;"></div>`
      }
      <div class="product-icon">${ICONS[k]}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-desc">${p.desc}</div>
      <a class="btn-primary" href="${URLS[k]}" target="_blank" rel="noopener">${t('learnMore')}</a>
    </div>`;
  }).join('');

  return `<div class="card">
    <span class="ep-badge ep-g">${epText.badge}</span>
    <div class="card-title">${epText.title}</div>
    <div class="card-subtitle">${desc}</div>
    <div class="product-grid">${cards}</div>
    <div class="dvd"></div>
    <div class="fallback">${t('notRight')} <a onclick="restart()">${t('startOver')}</a> ${t('orTalk')} <a href="#">${t('talkPerson')}</a></div>
  </div>`;
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
function esc(s) { return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

function pick(val, stepIdx) {
  st.ans[stepIdx] = val;
  render();
}

function goNext() {
  if (!st.ans[st.step]) return;
  st.step++;
  render();
}

function goBack() {
  if (st.step > 0) { st.step--; render(); }
}

function restart() {
  st = { step: 0, ans: {} };
  render();
  document.getElementById('shell').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
applyStaticTranslations();
render();
</script>
