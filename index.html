*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

  --font: 'DM Sans', sans-serif; --font-display: 'DM Serif Display', serif;
  --transition: all 0.2s cubic-bezier(0.4,0,0.2,1);

html { font-size: 16px; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

.topbar-right { font-size: 13px; color: var(--text2); }
.topbar-right a { color: var(--green); text-decoration: none; font-weight: 500; }
 
/* Main layout */
.main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 2.5rem 1.5rem 4rem; }
.container { width: 100%; max-width: 680px; }
 
/* Tab nav */
.tab-bar { display: flex; gap: 4px; margin-bottom: 1.5rem; flex-wrap: wrap; background: var(--white); padding: 5px; border-radius: var(--rl); border: 1px solid var(--border); box-shadow: var(--shadow); }
.tab { padding: 7px 12px; border-radius: var(--r); border: none; background: transparent; color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: var(--transition); white-space: nowrap; }
.tab:hover { background: var(--green-light); color: var(--green-dark); }
.tab.active { background: var(--green); color: var(--white); box-shadow: 0 2px 8px rgba(29,158,117,0.3); }
 
/* Quiz card */
.card { background: var(--white); border-radius: var(--rxl); border: 1px solid var(--border); box-shadow: var(--shadow-lg); overflow: hidden; }
.card-header { padding: 2rem 2rem 1.5rem; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, #F0FAF6 0%, var(--white) 60%); }
.quiz-label { font-size: 11px; font-weight: 600; color: var(--green); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.quiz-title { font-family: var(--font-display); font-size: 26px; color: var(--text); line-height: 1.2; margin-bottom: 6px; }
.quiz-sub { font-size: 14px; color: var(--text2); line-height: 1.6; }
 
/* Progress */
.progress-wrap { padding: 1.25rem 2rem 0; }
.progress-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.progress-label { font-size: 12px; color: var(--text3); font-weight: 500; }
.progress-count { font-size: 12px; font-weight: 600; color: var(--green); }
.pbar { height: 3px; background: var(--bg2); border-radius: 2px; overflow: hidden; }
.pfill { height: 100%; background: linear-gradient(90deg, var(--green) 0%, #2DC98F 100%); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
 
/* Steps */
.card-body { padding: 1.5rem 2rem 2rem; }
.step { display: none; animation: fadeUp 0.2s ease; }
.step.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.step-q { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; line-height: 1.4; }
.opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
.opt { padding: 12px 16px; border-radius: var(--r); border: 1.5px solid var(--border2); background: var(--white); color: var(--text); font-size: 14px; font-weight: 400; cursor: pointer; font-family: var(--font); transition: var(--transition); text-align: left; display: flex; align-items: center; gap: 10px; }

.opt:hover { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
.opt:hover::before { border-color: var(--green); }

.opt.sel::before { background: var(--green); border-color: var(--green); box-shadow: inset 0 0 0 3px white; }

.ep-icon.blue { background: #EAF2FC; }
.ep-icon.amber { background: #FEF3E2; }

.pcard-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }

.pcard-desc { font-size: 12px; color: var(--text2); line-height: 1.6; }
.ctas { display: flex; gap: 8px; flex-wrap: wrap; }
.cp { padding: 10px 22px; background: var(--green); color: white; border: none; border-radius: var(--r); font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: var(--transition); }

.cform { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

@media (max-width: 600px) {
  .topbar { padding: 1rem 1.25rem; }
  .main { padding: 1.25rem 1rem 3rem; }

  .quiz-title { font-size: 22px; }
  .progress-wrap { padding: 1rem 1.25rem 0; }
  .card-body { padding: 1.25rem 1.25rem 1.5rem; }

  .frow { grid-template-columns: 1fr; }
  .resource-cards { grid-template-columns: 1fr; }
  .tab { font-size: 11px; padding: 6px 10px; }
}

const st = { q:0, s:0, ans:[{},{},{},{},{},{},{},{}], ex:[false,false,false,false,false,false,false,false], retailPath:null };
 
function sw(i) {
  st.q=i; st.s=0; st.ans[i]={}; st.ex[i]=false; st.retailPath=null;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  render();
}
 
function totalSteps(qi) {
  const q=quizzes[qi];
  if(q.isRetail) return st.retailPath ? retailPaths[st.retailPath].steps.length : 1;
  return q.steps.length;
}
 
function render() {
  const q=quizzes[st.q];
  document.getElementById('ql').textContent=q.label;
  document.getElementById('qt').textContent=q.title;
  document.getElementById('qs').textContent=q.sub;
 
  if(q.isRetail) { renderRetail(); return; }
 
  const total=q.steps.length, cur=st.s, done=cur>=total||st.ex[st.q];
  const pct=done?100:Math.round(((cur+1)/total)*100);
  const stepNum=cur+1;
 
  document.getElementById('pw').style.display=done?'none':'block';
  document.getElementById('plbl').textContent=done?'':'Question';
  document.getElementById('pcnt').textContent=done?'':`${Math.min(stepNum,total)} / ${total}`;
  document.getElementById('pf').style.width=(done?100:Math.round((cur/total)*100))+'%';
  document.getElementById('cb').innerHTML=done?buildEp(q,q.endpoints):buildSteps(q.steps,total,cur);
}
 
function renderRetail() {
  const q=quizzes[5];
  if(!st.retailPath) {
    const gs=q.gateStep, sel=st.ans[5]['gate'];
    document.getElementById('pw').style.display='block';
    document.getElementById('plbl').textContent='Question';
    document.getElementById('pcnt').textContent='1 / 5';
    document.getElementById('pf').style.width='0%';
    document.getElementById('cb').innerHTML=`
      <div class="step active">
        <div class="step-q">${gs.q}</div>
        <div class="opts">${gs.opts.map(o=>`<button class="opt ${sel===o?'sel':''}" onclick="pickGate('${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
        <div class="nav"><span></span><button class="bnx ${sel?'rdy':''}" onclick="confirmGate()">Next →</button></div>
      </div>`;
    return;
  }
  const path=retailPaths[st.retailPath];
  const total=path.steps.length, cur=st.s, done=cur>=total;
  const displayStep=cur+2;
  const displayTotal=total+1;
  document.getElementById('pw').style.display=done?'none':'block';
  document.getElementById('plbl').textContent=done?'':'Question';
  document.getElementById('pcnt').textContent=done?'':`${Math.min(displayStep,displayTotal)} / ${displayTotal}`;
  document.getElementById('pf').style.width=(done?100:Math.round(((cur+1)/(total+1))*100))+'%';
  let html='';
  if(done){ html=buildEp(quizzes[5],path.endpoints); }
  else {
    const badge=`<div class="path-badge"><span class="path-dot"></span>${path.badge} path</div>`;
    html=badge+buildSteps(path.steps,total,cur);
  }
  document.getElementById('cb').innerHTML=html;
}
 
function buildSteps(steps,total,cur) {
  return steps.map((s,i)=>{
    const sel=st.ans[st.q][i];
    return `<div class="step ${i===cur?'active':''}">
      <div class="step-q">${s.q}</div>
      <div class="opts">${s.opts.map(o=>`<button class="opt ${sel===o?'sel':''}" onclick="pick(${i},'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
      <div class="nav">
        ${i>0||st.retailPath?`<button class="bbk" onclick="back()">← Back</button>`:`<span></span>`}
        <button class="bnx ${sel?'rdy':''}" onclick="nxt()">${i===total-1?'See my recommendation':'Next →'}</button>
      </div></div>`;
  }).join('');
}
 
function buildEp(q,endpoints) {
  if(st.ex[st.q]) {
    const cards=blogs.map(b=>`<div class="bcard"><div class="btag">${b.tag}</div><div class="btitle">${b.title}</div><div class="bread">${b.read}</div></div>`).join('');
    return `<div class="ep"><div class="ep-hero"><div><span class="ep-badge bg-a">No pressure</span><div class="ep-title">Here's what other Canadian businesses are reading.</div><div class="ep-desc">Take your time — we'll be here when you're ready.</div></div></div><div class="ep-body"><div class="bcards">${cards}</div><div class="dvd"></div><p class="fb">Changed your mind? <a onclick="rst()">Find your solution →</a></p></div></div>`;
  }
  const vals=Object.values(st.ans[st.q]);
  let ep=null;
  for(const v of vals){if(endpoints[v]){ep=endpoints[v];break;}}
  if(!ep)ep=endpoints.default;
 
  let body='';
  if(ep.type==='products'){
    const ranks=['1','2','3'];
    body=`<div class="ep-body"><div class="pcards">${ep.prods.map((p,i)=>`<div class="pcard ${i===ep.best?'best':''}"><div class="pcard-rank">${ranks[i]}</div><div class="pcard-info"><div class="pcard-name">${p.name}${i===ep.best?'<span class="best-tag">BEST FIT</span>':''}</div><div class="pcard-desc">${p.desc}</div></div></div>`).join('')}</div><div class="ctas"><button class="cp">${ep.cta}</button><button class="cs">${ep.cta2}</button></div><div class="dvd"></div><p class="fb">Not quite right? <a onclick="rst()">Start over</a> or <a href="#">talk to a real person →</a></p></div>`;
  } else if(ep.type==='route'){
    body=`<div class="ep-body"><div class="ctas"><button class="cp">${ep.cta}</button><button class="cs">${ep.cta2}</button></div><div class="dvd"></div><p class="fb">Not quite right? <a onclick="rst()">Start over</a> or <a href="#">talk to a real person →</a></p></div>`;
  } else if(ep.type==='explore-ent'){
    body=`<div class="ep-body"><div class="resource-cards"><div class="resource-card"><div class="resource-icon">📋</div><div class="resource-title">${ep.cta}</div><div class="resource-desc">Learn how Moneris serves organizations like yours.</div></div><div class="resource-card"><div class="resource-icon">📥</div><div class="resource-title">${ep.cta2}</div><div class="resource-desc">Get our full solutions guide to share with your team.</div></div></div><div class="dvd"></div><p class="fb">Ready to talk? <a href="#">Contact a specialist →</a></p></div>`;
  } else {
    body=`<div class="ep-body"><div class="cform"><div class="frow"><div class="fgroup"><div class="flbl">First name</div><input type="text" placeholder="Jane"></div><div class="fgroup"><div class="flbl">Last name</div><input type="text" placeholder="Smith"></div></div><div class="fgroup"><div class="flbl">Email address</div><input type="email" placeholder="jane@organization.com"></div><div class="fgroup"><div class="flbl">Phone number</div><input type="tel" placeholder="416-555-0100"></div></div><div class="ctas"><button class="cp">${ep.cta}</button></div><div class="dvd"></div><p class="fb">Not quite right? <a onclick="rst()">Start over</a> or <a href="#">talk to a real person →</a></p></div>`;
  }
 
  const iconMap={'bg-g':'✓','bg-b':'→','bg-a':'!'};
  const colorMap={'bg-g':'green','bg-b':'blue','bg-a':'amber'};
  return `<div class="ep"><div class="ep-hero"><div class="ep-icon ${colorMap[ep.bc]}">${iconMap[ep.bc]}</div><div><span class="ep-badge ${ep.bc}">${ep.badge}</span><div class="ep-title">${ep.title}</div><div class="ep-desc">${ep.desc}</div></div></div>${body}</div>`;
}
 
function pickGate(val){st.ans[5]['gate']=val;renderRetail();}
function confirmGate(){const sel=st.ans[5]['gate'];if(!sel)return;st.retailPath=sel;st.s=0;st.ans[5]={};renderRetail();}
function pick(si,val){
  st.ans[st.q][si]=val;
  const q=quizzes[st.q];
  if(q.earlyExit&&si===q.earlyExit.step&&val===q.earlyExit.val){st.ex[st.q]=true;}
  render();
}
function nxt(){if(!st.ans[st.q][st.s])return;st.s++;render();}
function back(){
  if(st.q===5&&st.s===0){st.retailPath=null;st.ans[5]={};render();return;}
  if(st.s>0){st.s--;render();}
}
function rst(){st.s=0;st.ans[st.q]={};st.ex[st.q]=false;if(st.q===5)st.retailPath=null;render();}
 
sw(0);
</script>
